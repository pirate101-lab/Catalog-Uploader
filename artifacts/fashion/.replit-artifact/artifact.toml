kind = "web"
previewPath = "/"
title = "Fashion Site"
version = "1.0.0"
id = "artifacts/fashion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 8080

[services.development]
run = "pnpm --filter @workspace/fashion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fashion", "run", "build" ]
publicDir = "artifacts/fashion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25246"
BASE_PATH = "/"
