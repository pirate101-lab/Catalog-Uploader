<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>VELOUR | Modern Editorial Fashion</title>
    <meta name="description" content="VELOUR — modern editorial fashion with an after-dark edge. New season drops, exclusive collections, and trending pieces." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta property="og:title" content="VELOUR | Modern Editorial Fashion" />
    <meta property="og:description" content="New season drops, exclusive collections, and trending pieces — dress for the version of yourself you want to become." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/opengraph.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VELOUR | Modern Editorial Fashion" />
    <meta name="twitter:description" content="New season drops, exclusive collections, and trending pieces." />
    <meta name="twitter:image" content="/opengraph.png" />
    <meta name="theme-color" content="#5A4BFF" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800;9..144,900&display=swap" rel="stylesheet">
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      // Light is the default for new visitors; an explicit saved choice wins.
      (function () {
        try {
          var saved = localStorage.getItem('velour-theme');
          var theme = saved === 'dark' || saved === 'light' ? saved : 'light';
          var root = document.documentElement;
          root.classList.remove('dark', 'light');
          root.classList.add(theme);
          root.dataset.theme = theme;
        } catch (e) {
          /* localStorage unavailable; default light class on <html> stands. */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
